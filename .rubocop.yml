plugins:
  - rubocop-rails
  - rubocop-rspec
  - rubocop-performance

AllCops:
  TargetRubyVersion: 3.4.1
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - 'bin/**/*'
    - 'config/**/*'
    - 'db/**/*'
    - 'node_modules/**/*'
    - 'vendor/**/*'
    - 'tmp/**/*'
    - 'storage/**/*'
    - 'spec/spec_helper.rb'
    - 'spec/rails_helper.rb'

Layout/LineLength:
  Max: 150
  Exclude:
    - 'app/models/**/*'

Metrics/ModuleLength:
  Max: 150
  Exclude:
    - 'app/**/*'

Metrics/CyclomaticComplexity:
  Max: 30
  Exclude:
    - 'app/services/**/*'

Metrics/MethodLength:
  Max: 30
  Exclude:
    - 'app/controllers/**/*'
    - 'app/deliveries/**/*'

Metrics/AbcSize:
  Max: 30
  Exclude:
    - 'app/**/*'

Metrics/PerceivedComplexity:
  Max: 10
  Exclude:
    - 'app/**/*'

Metrics/ClassLength:
  Max: 300
  Exclude:
    - 'app/models/**/*'
    - 'app/deliveries/**/*'

Metrics/BlockLength:
  Exclude:
    - 'config/routes.rb'
    - 'spec/**/*'

Rails/FilePath:
  Enabled: false

Rails/Output:
  Exclude:
    - 'app/controllers/**/*'

Style/Documentation:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: true
  EnforcedStyle: always

Style/HashSyntax:
  EnforcedStyle: ruby19_no_mixed_keys

Style/RegexpLiteral:
  AllowInnerSlashes: true

Performance/RedundantBlockCall:
  Enabled: true

Performance/StringReplacement:
  Enabled: true

Rails/HasAndBelongsToMany:
  Enabled: false

Rails/SkipsModelValidations:
  Enabled: false

Rails/OutputSafety:
  Exclude:
    - 'app/helpers/**/*'

RSpec/SpecFilePathFormat:
  Exclude:
    - 'spec/controllers/api/v1/instance_endpoints_spec.rb'
    - 'spec/controllers/api/v1/statuses_mute_spec.rb'
    - 'spec/controllers/api/v1/timelines_list_spec.rb'
    - 'spec/controllers/concerns/relationship_fields_spec.rb'

RSpec/DescribeClass:
  Exclude:
    - 'spec/controllers/concerns/account_entity_fields_spec.rb'
    - 'spec/controllers/concerns/media_focus_spec.rb'
    - 'spec/controllers/concerns/status_entity_fields_spec.rb'

RSpec/IndexedLet:
  Exclude:
    - 'spec/queries/timeline_query_list_spec.rb'

Rails/ResponseParsedBody:
  Exclude:
    - 'spec/controllers/api/v1/streaming_controller_spec.rb'
    - 'spec/controllers/posts_controller_spec.rb'
    - 'spec/controllers/profiles_controller_spec.rb'
    - 'spec/requests/url_structure_spec.rb'

RSpec/DescribedClass:
  Exclude:
    - 'spec/controllers/concerns/activity_pub_follow_handlers_spec.rb'

RSpec/ExampleLength:
  Max: 30

RSpec/MultipleExpectations:
  Max: 15

RSpec/NestedGroups:
  Max: 3

RSpec/MessageSpies:
  Enabled: false

RSpec/AnyInstance:
  Enabled: false

RSpec/MultipleMemoizedHelpers:
  Max: 10

RSpec/VerifiedDoubles:
  Exclude:
    - 'spec/deliveries/streaming_delivery_spec.rb'

Naming/PredicateName:
  Exclude:
    - 'app/controllers/api/base_controller.rb'
    - 'app/models/activity_pub_object.rb'
    - 'app/models/media_attachment.rb'
    - 'app/services/follow_service.rb'
    - 'app/services/web_push_notification_service.rb'
    - 'app/deliveries/web_push_delivery.rb'
    - 'app/models/instance_config.rb'
    - 'app/services/relay_follow_service.rb'
